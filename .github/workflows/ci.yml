name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-web:
    name: Typecheck booking-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit

  typecheck-api:
    name: Typecheck booking-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-api
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-api/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit -p tsconfig.build.json

  typecheck-mobile:
    name: Typecheck mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit

  build-web:
    name: Build booking-web
    runs-on: ubuntu-latest
    needs: typecheck-web
    defaults:
      run:
        working-directory: booking-web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.pulseappointments.com
          API_INTERNAL_URL: https://api.pulseappointments.com
          NEXT_TELEMETRY_DISABLED: 1
