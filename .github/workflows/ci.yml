name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-web:
    name: Typecheck booking-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  typecheck-api:
    name: Typecheck booking-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.build.json

  build-web:
    name: Build booking-web
    runs-on: ubuntu-latest
    needs: typecheck-web
    defaults:
      run:
        working-directory: booking-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.pulseappointments.com
          API_INTERNAL_URL: https://api.pulseappointments.com
          NEXT_TELEMETRY_DISABLED: 1
