apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-web
  labels:
    app: booking-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-web
  template:
    metadata:
      labels:
        app: booking-web
    spec:
      containers:
        - name: booking-web
          image: canadasun/bookingapp-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: API_INTERNAL_URL
              value: "http://booking-api:3001"
---
apiVersion: v1
kind: Service
metadata:
  name: booking-web
spec:
  selector:
    app: booking-web
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
